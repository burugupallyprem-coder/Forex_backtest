name: fx-strategy12-orb

on:
  workflow_dispatch:   # manual only - stock ORB ported to FX majors basket, untouched-holdout judge

permissions:
  contents: write

concurrency:
  group: fx-strategy12-orb
  cancel-in-progress: false

jobs:
  strategy12orb:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Integrity check (guards against corrupted files)
        run: python -m compileall -q src tests

      - name: Unit tests
        run: |
          python tests/test_strategy10.py
          python tests/test_strategy12_fx_orb.py

      - name: Run FX majors ORB port research
        env:
          OANDA_API_KEY: ${{ secrets.OANDA_API_KEY }}
          OANDA_ENV: practice
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python -m src.backtest.strategy12_fx_orb

      - name: Commit reports
        if: always()
        run: |
          git config user.name "fx-research-bot"
          git config user.email "fx-research-bot@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "fx strategy12 ORB port $(date -u +%Y%m%dT%H%M%SZ)"
          git pull --rebase origin main || true
          git push
