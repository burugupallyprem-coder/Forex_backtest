name: fx-strategy10-diag

on:
  workflow_dispatch:   # manual only - train-only diagnostic (gold + S&P), no validation debt

permissions:
  contents: write

concurrency:
  group: fx-strategy10-diag
  cancel-in-progress: false

jobs:
  strategy10diag:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Integrity check (guards against corrupted files)
        run: python -m compileall -q src tests

      - name: Unit tests
        run: |
          python tests/test_strategy10.py
          python tests/test_strategy10_diag.py

      - name: Run train-only diagnostic (gold + S&P 500)
        env:
          OANDA_API_KEY: ${{ secrets.OANDA_API_KEY }}
          OANDA_ENV: practice
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python -m src.backtest.strategy10_diag

      - name: Commit reports
        if: always()
        run: |
          git config user.name "fx-research-bot"
          git config user.email "fx-research-bot@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "fx strategy10 diagnostic (gold + S&P) $(date -u +%Y%m%dT%H%M%SZ)"
          git pull --rebase origin main || true
          git push
