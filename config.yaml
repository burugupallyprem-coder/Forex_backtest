# Forex backtest - RESEARCH ONLY. Nothing here places trades.

risk:
  equity: 100000
  risk_pct: 0.5           # 0.5% of equity risked per trade - same as all projects
  max_position_pct: 20

fx_prevday:               # Peter's strategy, pre-registered 2026-07-16
  instruments: ["USD_JPY", "EUR_USD", "GBP_USD"]
  spread_pips:            # conservative retail spreads, modeled as half per side
    USD_JPY: 1.6
    EUR_USD: 1.4
    GBP_USD: 2.0
  train_start: "2024-07-01"
  train_end: "2025-12-31"
  val_start: "2026-01-01"
  val_end: null
  min_train_trades: 100
  min_train_expectancy_r: 0.02
  min_stop_cost_mult: 2.0 # skip setups whose stop < 2x round-trip cost
  gate:
    min_trades: 100
    min_expectancy_r: 0.05
    min_profit_factor: 1.15
    min_quarters_positive_frac: 0.6
  grids:
    target_fib: [0.382, 0.5]
    stop_buf_frac: [0.1, 0.2]
    max_trades_day: [1, 2]

fx_strategy2:             # Peter's strategy #2, 4 trigger families, pre-registered 2026-07-16
  instruments: ["USD_JPY", "EUR_USD", "GBP_USD"]
  spread_pips:
    USD_JPY: 1.6
    EUR_USD: 1.4
    GBP_USD: 2.0
  train_start: "2024-07-01"
  train_end: "2025-12-31"
  val_start: "2026-01-01"
  val_end: null
  min_train_trades: 100
  min_train_expectancy_r: 0.02
  min_stop_cost_mult: 2.0
  gate:
    min_trades: 100
    min_expectancy_r: 0.05
    min_profit_factor: 1.15
    min_quarters_positive_frac: 0.6
  # family grids + RSI thresholds live in src/backtest/strategy2_sweep.py (declared)

fx_strategy3:             # Overlap opening-range breakout, pre-registered 2026-07-17
  instruments: ["USD_JPY", "EUR_USD", "GBP_USD"]
  spread_pips:
    USD_JPY: 1.6
    EUR_USD: 1.4
    GBP_USD: 2.0
  overlap_start_min: 780   # 13:00 UTC - London/NY overlap begins
  overlap_end_min: 1020    # 17:00 UTC - flat here (overlap-only trade)
  sma_days: 50             # daily-trend filter lookback (prev close vs 50d SMA)
  train_start: "2024-07-01"
  train_end: "2025-12-31"
  val_start: "2026-01-01"
  val_end: null
  min_train_trades: 100
  min_train_expectancy_r: 0.02
  min_stop_cost_mult: 2.0
  gate:
    min_trades: 100
    min_expectancy_r: 0.05
    min_profit_factor: 1.15
    min_quarters_positive_frac: 0.6
  grids:
    or_minutes: [30, 60]
    target_r: [1.0, 1.5]
    trend_filter: [false, true]

fx_strategy4:             # Daily-timeframe FX trend (MA cross), pre-registered 2026-07-17
  instruments: ["USD_JPY", "EUR_USD", "GBP_USD"]
  spread_pips:
    USD_JPY: 1.6
    EUR_USD: 1.4
    GBP_USD: 2.0
  granularity: "D"         # daily candles
  atr_len: 20              # ATR lookback for the protective stop
  atr_k: 3.0               # stop = entry -/+ atr_k x ATR (fixed, not tuned)
  train_start: "2005-01-01"
  train_end: "2019-12-31"
  val_start: "2020-01-01"
  val_end: null
  min_train_trades: 100
  min_train_expectancy_r: 0.02
  min_stop_cost_mult: 2.0
  gate:
    min_trades: 100
    min_expectancy_r: 0.05
    min_profit_factor: 1.15
    min_quarters_positive_frac: 0.6
  grids:
    fast: [20, 50]
    slow: [100, 200]

fx_strategy5:             # Regime-conditional daily trend (ER-gated 20/200), pre-registered 2026-07-17
  instruments: ["USD_JPY", "EUR_USD", "GBP_USD"]
  spread_pips:
    USD_JPY: 1.6
    EUR_USD: 1.4
    GBP_USD: 2.0
  granularity: "D"
  fast: 20                 # base trend fixed = strategy #4 train winner
  slow: 200
  er_len: 20               # Efficiency Ratio lookback (regime gate)
  atr_len: 20
  atr_k: 3.0
  train_start: "2005-01-01"
  train_end: "2019-12-31"
  val_start: "2020-01-01"
  val_end: null
  min_train_trades: 100
  min_train_expectancy_r: 0.02
  min_stop_cost_mult: 2.0
  gate:
    min_trades: 100
    min_expectancy_r: 0.05
    min_profit_factor: 1.15
    min_quarters_positive_frac: 0.6
  grids:
    er_min: [0.25, 0.35, 0.45]

fx_strategy6:             # S5 rule re-tested on WIDER basket + swap model, pre-registered 2026-07-17
  instruments: ["USD_JPY", "EUR_USD", "GBP_USD", "AUD_USD", "USD_CHF", "USD_CAD", "NZD_USD"]
  spread_pips:
    USD_JPY: 1.6
    EUR_USD: 1.4
    GBP_USD: 2.0
    AUD_USD: 1.5
    USD_CHF: 1.8
    USD_CAD: 1.8
    NZD_USD: 2.0
  granularity: "D"
  fast: 20
  slow: 200
  er_len: 20
  atr_len: 20
  atr_k: 3.0
  swap_annual_pct: 2.5     # conservative symmetric overnight financing drag (declared stand-in)
  train_start: "2005-01-01"
  train_end: "2019-12-31"
  val_start: "2020-01-01"
  val_end: null
  min_train_trades: 100
  min_train_expectancy_r: 0.02
  min_stop_cost_mult: 2.0
  gate:
    min_trades: 100
    min_expectancy_r: 0.05
    min_profit_factor: 1.15
    min_quarters_positive_frac: 0.6
  grids:
    er_min: [0.25, 0.35, 0.45]

fx_strategy7:             # News-reaction (volatility+volume spike proxy), continuation, pre-registered 2026-07-17
  instruments: ["USD_JPY", "EUR_USD", "GBP_USD", "AUD_USD", "USD_CHF", "USD_CAD", "NZD_USD"]
  spread_pips:
    USD_JPY: 1.6
    EUR_USD: 1.4
    GBP_USD: 2.0
    AUD_USD: 1.5
    USD_CHF: 1.8
    USD_CAD: 1.8
    NZD_USD: 2.0
  granularity: "M15"
  atr_len: 20
  vol_len: 20
  vol_mult: 3.0            # volume > 3x average = news footprint
  stop_atr: 1.5            # protective stop = entry -/+ 1.5 x ATR
  news_spread_mult: 6.0    # entry pays 6x normal spread (news-time blowout; concept test showed 5-10x)
  train_start: "2018-01-01"
  train_end: "2022-12-31"
  val_start: "2023-01-01"
  val_end: null
  min_train_trades: 100
  min_train_expectancy_r: 0.02
  gate:
    min_trades: 100
    min_expectancy_r: 0.05
    min_profit_factor: 1.15
    min_quarters_positive_frac: 0.6
  grids:
    spike_k: [2.5, 3.5]
    hold_bars: [4, 8]

fx_strategy8:             # Intraday statistical arbitrage (pairs mean-reversion), pre-registered 2026-07-17
  leg_pairs:
    - ["AUD_USD", "NZD_USD"]
    - ["EUR_USD", "GBP_USD"]
    - ["EUR_USD", "USD_CHF"]
  spread_pips:
    AUD_USD: 1.5
    NZD_USD: 2.0
    EUR_USD: 1.4
    GBP_USD: 2.0
    USD_CHF: 1.8
  granularity: "H1"        # intraday; positions typically revert within a day
  z_exit: 0.0              # exit when spread reverts to its mean
  stop_z: 4.0              # blow-out stop
  max_hold: 48             # H1 bars hard cap (~2 days)
  train_start: "2018-01-01"
  train_end: "2022-12-31"
  val_start: "2023-01-01"
  val_end: null
  min_train_trades: 100
  min_train_expectancy_r: 0.02
  gate:
    min_trades: 100
    min_expectancy_r: 0.05
    min_profit_factor: 1.15
    min_quarters_positive_frac: 0.6
  grids:
    z_enter: [2.0, 2.5]
    lookback: [50, 100]

fx_strategy9:             # SMC swing basket (frozen engine, ZERO knobs), pre-registered 2026-07-18
  instruments: ["XAU_USD", "XAG_USD", "EUR_USD", "GBP_USD", "USD_JPY",
                "AUD_USD", "USD_CAD", "USD_CHF", "NZD_USD"]
  spread_price:            # round-trip cost in the instrument's own price units
    XAU_USD: 0.35
    XAG_USD: 0.035
    EUR_USD: 0.00014
    GBP_USD: 0.0002
    USD_JPY: 0.016
    AUD_USD: 0.00015
    USD_CAD: 0.00018
    USD_CHF: 0.00018
    NZD_USD: 0.0002
  granularity: "M15"       # engine resamples to H1/H4/D internally
  max_concurrent: 3        # portfolio bankroll rule; later entries skipped
  train_start: "2019-01-01"
  train_end: "2023-12-31"
  val_start: "2024-01-01"
  val_end: null
  min_train_trades: 100
  min_train_expectancy_r: 0.02
  gate:
    min_trades: 100
    min_expectancy_r: 0.05
    min_profit_factor: 1.15
    min_quarters_positive_frac: 0.6
  # NO grids - engine parameters are frozen from the gold prototype (declared).

fx_strategy10:            # Peter's 3-step "boring" scalp (EMA dir + PDH/PDL + 5m OR + 1m retest), pre-registered 2026-07-22
  instruments: ["USD_JPY", "EUR_USD", "GBP_USD"]
  spread_pips:            # conservative retail spreads, modeled as half per side
    USD_JPY: 1.6
    EUR_USD: 1.4
    GBP_USD: 2.0
  granularity: "M1"        # 1-minute entries/management (the strategy's execution TF)
  ny_open_min: 810         # 13:30 UTC - NY open (fixed; DST drift accepted, as elsewhere in repo)
  or_minutes: 5            # first 5-minute opening-range at NY open
  flat_min: 1260           # flat by 21:00 UTC
  ema_fast: 9              # daily EMA fast (direction)
  ema_slow: 21             # daily EMA slow (direction)
  zone_frac: 0.05          # PDH/PDL "zone" half-width = zone_frac x prev-day range (wiggle room)
  stop_buf_frac: 0.10      # initial stop buffer behind broken level = stop_buf_frac x prev-day range
  train_start: "2024-07-01"
  train_end: "2025-12-31"
  val_start: "2026-01-01"
  val_end: null
  min_train_trades: 100
  min_train_expectancy_r: 0.02
  min_stop_cost_mult: 2.0  # skip setups whose initial stop < 2x round-trip cost
  gate:
    min_trades: 100
    min_expectancy_r: 0.05
    min_profit_factor: 1.15
    min_quarters_positive_frac: 0.6
  grids:
    trail_lookback: [10, 20]   # trailing stop rides behind the low/high of last N 1-min bars
    trend_filter: [false, true] # true = only trade with daily 9/21 EMA trend; false = also trade ranges
    max_trades_day: [1, 2]
